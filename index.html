<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link rel="apple-touch-icon" href="./unnamed.webp">
  <link rel="icon" type="image/webp" href="./unnamed.webp">
  <meta name="apple-mobile-web-app-title" content="미리보기">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>미리보기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .top-bar {
      height: 69px;
      background: #ffffff;
      padding: 12px 14px;
      border-bottom: 1px solid #ddd;
    }

    .list-btn {
      width: 100%;
      height: 44px;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .notice {
      padding: 12px 16px;
      color: red;
      font-size: 14px;
      line-height: 1.45;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .image-wrap {
      width: 100%;
      height: calc(100vh - 69px - 59px);
      overflow: hidden;
      background: #e9e9e9;
      touch-action: none;
      position: relative;
    }

    .preview-img {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <button class="list-btn" onclick="closePage()">목록</button>
  </div>

  <div class="notice">
    미리보기 서비스 출력물은 법적인 효력이 없으며 최초 미리보기 후 24시간 이내 미리보기 하실 수 있습니다.
  </div>

  <div class="image-wrap" id="imageWrap">
    <img
      class="preview-img"
      id="previewImg"
      src="./정부24 - 병적증명서 발급 _ 문서출력.png"
      alt="문서 미리보기 이미지"
    />
  </div>

  <script>
    function closePage() {
      window.close();

      setTimeout(function () {
        history.back();
      }, 100);
    }

    const wrap = document.getElementById("imageWrap");
    const img = document.getElementById("previewImg");

    let scale = 1;
    let startScale = 1;

    let translateX = 0;
    let translateY = 0;

    let startX = 0;
    let startY = 0;

    let lastDistance = 0;
    let isDragging = false;

    function updateTransform() {
      img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    wrap.addEventListener("touchstart", function (e) {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      }

      if (e.touches.length === 2) {
        isDragging = false;
        lastDistance = getDistance(e.touches);
        startScale = scale;
      }
    }, { passive: false });

    wrap.addEventListener("touchmove", function (e) {
      e.preventDefault();

      if (e.touches.length === 1 && isDragging) {
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
      }

      if (e.touches.length === 2) {
        const currentDistance = getDistance(e.touches);
        scale = startScale * (currentDistance / lastDistance);

        if (scale < 1) scale = 1;
        if (scale > 5) scale = 5;

        updateTransform();
      }
    }, { passive: false });

    wrap.addEventListener("touchend", function () {
      isDragging = false;

      if (scale === 1) {
        translateX = 0;
        translateY = 0;
        updateTransform();
      }
    });
  </script>
</body>
</html>
